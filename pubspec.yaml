name: piano
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  audioplayers: ^6.6.0
  flutter:
    sdk: flutter
 # flutter_midi: ^1.1.0
  flutter_launcher_icons: ^0.14.4
  flutter_midi_pro: ^3.1.6
  http: ^1.6.0
  provider: ^6.1.5+1
  sqflite: ^2.4.2
  url_launcher: ^6.3.2
  wakelock_plus: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/piano/kawai_grand_piano.sf2
    - assets/sounds/

  fonts:
    - family: CyberFont
      fonts:
        - asset: assets/fonts/Orbitron-Bold.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
